name: host-publish

on:
  push:
    branches:
      - main
    paths:
      - "host/**"
      - "tools/publish_hosts.ps1"
      - "tools/wpf_launch_smoke.ps1"
      - "tools/compare_winui_diag_manifest.ps1"
      - "tools/run_quality_baseline.ps1"
      - "tools/vsfavatar_quality_gate.ps1"
      - "tools/vsfavatar_sample_report.ps1"
      - "tools/vrm_quality_gate.ps1"
      - "tools/vxavatar_quality_gate.ps1"
      - "src/nativecore/**"
      - "include/vsfclone/nativecore/**"
      - "CMakeLists.txt"
      - ".github/workflows/host-publish.yml"
  pull_request:
    paths:
      - "host/**"
      - "tools/publish_hosts.ps1"
      - "tools/wpf_launch_smoke.ps1"
      - "tools/compare_winui_diag_manifest.ps1"
      - "tools/run_quality_baseline.ps1"
      - "tools/vsfavatar_quality_gate.ps1"
      - "tools/vsfavatar_sample_report.ps1"
      - "tools/vrm_quality_gate.ps1"
      - "tools/vxavatar_quality_gate.ps1"
      - "src/nativecore/**"
      - "include/vsfclone/nativecore/**"
      - "CMakeLists.txt"
      - ".github/workflows/host-publish.yml"
  workflow_dispatch:

jobs:
  quality-baseline:
    runs-on: windows-latest
    defaults:
      run:
        shell: powershell
        working-directory: NativeVsfClone

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64

      - name: Build
        run: cmake --build build --config Release

      - name: Run Quality Baseline
        run: powershell -ExecutionPolicy Bypass -File .\tools\run_quality_baseline.ps1

      - name: Upload Quality Baseline Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: quality-baseline-reports
          if-no-files-found: warn
          path: |
            NativeVsfClone/build/reports/quality_baseline_summary.txt
            NativeVsfClone/build/reports/vsfavatar_gate_summary.txt
            NativeVsfClone/build/reports/vsfavatar_gate_aggregate.csv
            NativeVsfClone/build/reports/vsfavatar_gate_aggregate.txt
            NativeVsfClone/build/reports/vrm_gate_fixed5.txt
            NativeVsfClone/build/reports/vxavatar_gate_summary.txt

  publish-hosts-wpf:
    needs: quality-baseline
    runs-on: windows-latest
    defaults:
      run:
        shell: powershell
        working-directory: NativeVsfClone

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64

      - name: Build
        run: cmake --build build --config Release

      - name: Publish Hosts (WPF-first)
        run: powershell -ExecutionPolicy Bypass -File .\tools\publish_hosts.ps1 -SkipNativeBuild

      - name: Validate WPF Dist Artifacts
        run: |
          $wpfExe = Join-Path $PWD "dist\wpf\WpfHost.exe"
          $wpfDll = Join-Path $PWD "dist\wpf\nativecore.dll"
          $report = Join-Path $PWD "build\reports\host_publish_latest.txt"

          $required = @($wpfExe, $wpfDll, $report)
          $missing = @()
          foreach ($path in $required) {
            if (-not (Test-Path $path)) { $missing += $path }
          }

          if ($missing.Count -gt 0) {
            Write-Host "Missing required host publish artifacts:"
            $missing | ForEach-Object { Write-Host " - $_" }
            exit 1
          }

      - name: Upload Host Publish Outputs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: host-publish-wpf-outputs
          if-no-files-found: warn
          path: |
            NativeVsfClone/dist/wpf
            NativeVsfClone/build/reports/host_publish_latest.txt
            NativeVsfClone/build/reports/wpf_launch_smoke_latest.txt

  publish-hosts-winui-diagnostics:
    needs: quality-baseline
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, windows-2022]
    defaults:
      run:
        shell: powershell
        working-directory: NativeVsfClone

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64

      - name: Build
        run: cmake --build build --config Release

      - name: Publish Hosts (WPF + WinUI optional diagnostics)
        run: powershell -ExecutionPolicy Bypass -File .\tools\publish_hosts.ps1 -SkipNativeBuild -IncludeWinUi

      - name: Validate WinUI Diagnostic Manifest
        run: |
          $manifest = Join-Path $PWD "build\reports\winui\winui_diagnostic_manifest.json"
          if (-not (Test-Path $manifest)) {
            Write-Host "Missing WinUI diagnostic manifest: $manifest"
            exit 1
          }

      - name: Summarize WinUI Diagnostic Manifest
        if: always()
        run: |
          $manifestPath = Join-Path $PWD "build\reports\winui\winui_diagnostic_manifest.json"
          $summaryPath = Join-Path $PWD "build\reports\winui_manifest_summary_${{ matrix.os }}.txt"
          if (-not (Test-Path $manifestPath)) {
            "manifest_missing=true" | Set-Content -Path $summaryPath -Encoding UTF8
            "### WinUI diagnostics (${{ matrix.os }})`n- manifest missing" >> $env:GITHUB_STEP_SUMMARY
            exit 0
          }

          $manifest = Get-Content -Raw -Path $manifestPath | ConvertFrom-Json
          $lines = @()
          $lines += "os=${{ matrix.os }}"
          $lines += "failure_class=$($manifest.failure_class)"
          $lines += "failure_class_confidence=$($manifest.failure_class_confidence)"
          $lines += "preflight_passed=$($manifest.preflight.passed)"
          $lines += "preflight_failed_checks=$(([string]::Join(',', @($manifest.preflight.failed_checks))))"
          $lines += "preflight_warnings=$(([string]::Join(',', @($manifest.preflight.warnings))))"
          $lines += "nuget_enabled=$($manifest.nuget_probe.summary.enabled)"
          $lines += "nuget_reachable=$($manifest.nuget_probe.summary.reachable)"
          $lines += "nuget_unreachable=$($manifest.nuget_probe.summary.unreachable)"
          $lines | Set-Content -Path $summaryPath -Encoding UTF8

          "### WinUI diagnostics (${{ matrix.os }})" >> $env:GITHUB_STEP_SUMMARY
          "- failure_class: $($manifest.failure_class)" >> $env:GITHUB_STEP_SUMMARY
          "- preflight_failed_checks: $(([string]::Join(',', @($manifest.preflight.failed_checks))))" >> $env:GITHUB_STEP_SUMMARY
          "- nuget summary: enabled=$($manifest.nuget_probe.summary.enabled), reachable=$($manifest.nuget_probe.summary.reachable), unreachable=$($manifest.nuget_probe.summary.unreachable)" >> $env:GITHUB_STEP_SUMMARY

      - name: Upload WinUI Diagnostic Outputs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: host-publish-winui-diagnostics-${{ matrix.os }}
          if-no-files-found: warn
          path: |
            NativeVsfClone/dist/winui
            NativeVsfClone/build/reports/host_publish_latest.txt
            NativeVsfClone/build/reports/wpf_launch_smoke_latest.txt
            NativeVsfClone/build/reports/winui/winui_diagnostic_manifest.json
            NativeVsfClone/build/reports/winui/winui_build.binlog
            NativeVsfClone/build/reports/winui/winui_build_diag.log
            NativeVsfClone/build/reports/winui/winui_build_managed_diag.log
            NativeVsfClone/build/reports/winui/obj-dump
            NativeVsfClone/build/reports/winui_manifest_summary_*.txt
